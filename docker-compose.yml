services:
  app:
    build:
      context: .
      target: development
      args:
        HOST_UID: ${HOST_UID:-1000}
        HOST_GID: ${HOST_GID:-1000}
    container_name: ticketing-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/app.ini
    networks:
      - ticketing
    depends_on:
      - mysql
      - redis

  nginx:
    image: nginx:alpine
    container_name: ticketing-nginx
    restart: unless-stopped
    ports:
      - "8005:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - ticketing
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: ticketing-mysql
    restart: unless-stopped
    ports:
      - "3315:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-ticketing}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ticketing
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: ticketing-redis
    restart: unless-stopped
    ports:
      - "6385:6379"
    volumes:
      - redis_data:/data
    networks:
      - ticketing
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Optional: Node for Vite dev server
  # Uncomment if you prefer running Vite in Docker
  # node:
  #   image: node:20-alpine
  #   container_name: ticketing-node
  #   working_dir: /var/www/html
  #   ports:
  #     - "5173:5173"
  #   volumes:
  #     - .:/var/www/html
  #   command: sh -c "npm install && npm run dev -- --host"
  #   networks:
  #     - ticketing

networks:
  ticketing:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
