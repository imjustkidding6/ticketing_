name: Deploy to ECS

on:
  push:
    branches: [main]

jobs:
  test:
    uses: ./.github/workflows/test.yml

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ticketing
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG --target=production .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Run database migrations
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          aws ecs run-task \
            --cluster ticketing \
            --task-definition ticketing-web \
            --overrides '{"containerOverrides":[{"name":"ticketing-web","command":["php","artisan","migrate","--force"]}]}' \
            --region ${{ vars.AWS_REGION }}

      - name: Deploy web service
        run: |
          aws ecs update-service \
            --cluster ticketing \
            --service ticketing-web \
            --force-new-deployment \
            --region ${{ vars.AWS_REGION }}

      - name: Deploy worker service
        run: |
          aws ecs update-service \
            --cluster ticketing \
            --service ticketing-worker \
            --force-new-deployment \
            --region ${{ vars.AWS_REGION }}

      - name: Wait for web service stability
        run: |
          aws ecs wait services-stable \
            --cluster ticketing \
            --services ticketing-web \
            --region ${{ vars.AWS_REGION }}
